<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>内容管理</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-grain"></div>

    <section class="login-wrap" id="login-wrap">
      <div class="admin-card">
        <h1 style="margin-top:0">后台登录</h1>
        <p class="hint">仅你自己可用。登录后可以更新头像和帖子。</p>
        <p class="hint">登录态默认保持约30天，手机无需频繁重登。</p>
        <form id="login-form">
          <div class="form-row">
            <label for="login-email">邮箱</label>
            <input class="input" id="login-email" name="email" type="email" required autocomplete="email" />
          </div>
          <div class="form-row">
            <label for="login-password">密码</label>
            <input class="input" id="login-password" name="password" type="password" required autocomplete="current-password" />
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">登录</button>
          </div>
        </form>
      </div>
    </section>

    <main class="admin-shell hidden" id="admin-shell">
      <header class="admin-head">
        <h1 id="admin-title">内容管理</h1>
        <div class="form-actions" style="margin-top:8px">
          <a class="btn btn-secondary" href="/">查看主页</a>
          <button class="btn btn-ghost" type="button" id="logout-btn">退出登录</button>
        </div>
      </header>

      <section class="admin-grid">
        <article class="admin-card full">
          <h2 style="margin-top:0">个人信息</h2>
          <form id="profile-form">
            <div class="form-row">
              <label for="display-name">显示名称</label>
              <input class="input" id="display-name" name="displayName" maxlength="80" required />
            </div>
            <div class="form-row">
              <label for="about-md">关于我（显示在头像右侧）</label>
              <textarea class="textarea" id="about-md" name="aboutMd" style="min-height:130px"></textarea>
            </div>
            <div class="form-row">
              <label>头像</label>
              <div class="row-inline">
                <input class="input" id="avatar-file" type="file" accept="image/*" style="padding:8px" />
                <button class="btn btn-secondary btn-sm" type="button" id="upload-avatar-btn">裁剪并上传头像</button>
              </div>
              <input id="avatar-media-id" type="hidden" />
              <img class="upload-preview hidden" id="avatar-preview" alt="头像预览" />
              <div class="hint">支持缩放与裁剪。建议使用清晰正方形图片。</div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">保存个人信息</button>
            </div>
          </form>
        </article>

        <article class="admin-card full">
          <h2 style="margin-top:0">写新帖子</h2>
          <form id="post-form">
            <input id="editing-post-id" type="hidden" />
            <div class="form-row">
              <label for="post-title">标题</label>
              <input class="input" id="post-title" name="title" maxlength="160" required />
            </div>
            <div class="form-row">
              <label for="post-slug">Slug（URL片段）</label>
              <input class="input" id="post-slug" name="slug" maxlength="80" required />
            </div>
            <div class="form-row">
              <label for="post-summary">摘要（可选）</label>
              <textarea class="textarea" id="post-summary" name="summary" maxlength="300"></textarea>
            </div>
            <div class="form-row">
              <label for="post-content">正文（Markdown）</label>
              <textarea class="textarea" id="post-content" name="contentMd" style="min-height:180px" required></textarea>
            </div>
            <div class="form-row">
              <label>封面图</label>
              <div class="row-inline">
                <input class="input" id="cover-file" type="file" accept="image/*" style="padding:8px" />
                <button class="btn btn-secondary btn-sm" type="button" id="upload-cover-btn">上传封面</button>
              </div>
              <input id="cover-media-id" type="hidden" />
              <img class="upload-preview hidden" id="cover-preview" alt="封面预览" />
            </div>
            <div class="row-inline">
              <div class="form-row" style="margin:0; min-width:180px; flex:1">
                <label for="post-status">状态</label>
                <select class="select" id="post-status" name="status">
                  <option value="draft">草稿</option>
                  <option value="published">发布</option>
                  <option value="archived">归档</option>
                </select>
              </div>
              <div class="form-row" style="margin:0; min-width:120px">
                <label for="post-pinned">置顶</label>
                <select class="select" id="post-pinned" name="isPinned">
                  <option value="false">否</option>
                  <option value="true">是</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit" id="save-post-btn">保存帖子</button>
              <button class="btn btn-ghost" type="button" id="reset-post-btn">清空表单</button>
            </div>
          </form>
        </article>

        <article class="admin-card full">
          <h2 style="margin-top:0">帖子列表</h2>
          <div class="admin-post-list" id="post-list">
            <div class="loading-block">加载中...</div>
          </div>
        </article>
      </section>
    </main>

    <dialog class="crop-dialog" id="avatar-crop-dialog">
      <div class="crop-panel">
        <h3>裁剪头像</h3>
        <p class="hint">拖动图片调整位置，滑块调整缩放。</p>
        <div class="crop-stage-wrap">
          <canvas id="avatar-crop-canvas" class="crop-canvas" width="320" height="320"></canvas>
        </div>
        <div class="form-row" style="margin:12px 0 8px">
          <label for="avatar-zoom">缩放</label>
          <input id="avatar-zoom" type="range" min="1" max="3" step="0.01" value="1" />
        </div>
        <div class="form-actions" style="justify-content:flex-end">
          <button class="btn btn-ghost" id="avatar-crop-cancel" type="button">取消</button>
          <button class="btn btn-primary" id="avatar-crop-confirm" type="button">确认裁剪</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="/assets/admin.js"></script>
  </body>
</html>
