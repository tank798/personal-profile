<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人主页</title>
    <meta name="description" content="一个温暖、简约、可持续更新的个人数字空间" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-grain"></div>
    <div class="page-shell">
      <header class="profile-hero container">
        <article class="profile-card" id="profile-card">
          <div class="avatar-wrap" id="avatar-wrap">
            <div class="avatar-fallback">我</div>
          </div>
          <div class="profile-main">
            <h1 class="profile-name" id="profile-name">正在加载...</h1>
            <p class="profile-about" id="profile-about">正在加载关于我...</p>
          </div>
        </article>
      </header>

      <main class="container">
        <section class="content-head">
          <h2 class="content-title">我的世界</h2>
        </section>

        <section class="post-carousel-wrap" id="post-carousel-wrap">
          <button class="carousel-btn prev hidden" id="carousel-prev" type="button" aria-label="上一条">‹</button>
          <div class="post-carousel" id="post-carousel">
            <div class="loading-block">内容加载中...</div>
          </div>
          <button class="carousel-btn next hidden" id="carousel-next" type="button" aria-label="下一条">›</button>
        </section>
      </main>
    </div>

    <script type="module" src="/assets/index.js"></script>
  </body>
</html>
