    <script>
      (() => {
        const root = document.documentElement;
        const entryStorageKey = 'castle-entry-gate-seen';
        let shouldShowEntry = true;

        try {
          shouldShowEntry = window.sessionStorage.getItem(entryStorageKey) !== '1';
        } catch {
          shouldShowEntry = true;
        }

        const release = () => {
          root.classList.add('entry-ready');
          root.classList.remove('entry-locked');

          try {
            window.sessionStorage.setItem(entryStorageKey, '1');
          } catch {
            // Ignore storage failures and continue rendering the page.
          }
        };

        window.__castleShouldShowEntry = shouldShowEntry;
        window.__castleEntryRelease = release;

        if (!shouldShowEntry) {
          root.classList.add('entry-ready');
          return;
        }

        root.classList.add('entry-locked');
        window.__castleEntryFallback = window.setTimeout(release, 20000);
        window.addEventListener('error', release, { once: true });
        window.addEventListener('unhandledrejection', release, { once: true });
      })();
    </script>
