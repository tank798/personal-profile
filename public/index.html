<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人主页</title>
    <meta name="description" content="一个温暖、简约、可持续更新的个人数字空间" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="bg-grain"></div>
    <div class="page-shell">
      <header class="profile-hero container">
        <article class="profile-card" id="profile-card">
          <div class="avatar-wrap" id="avatar-wrap">
            <div class="avatar-fallback">我</div>
          </div>
          <div>
            <h1 class="profile-name" id="profile-name">正在加载...</h1>
            <p class="profile-subtitle" id="profile-subtitle"></p>
            <p class="profile-bio" id="profile-bio"></p>
            <div class="hero-actions">
              <button class="btn btn-primary" type="button" id="about-open">关于我</button>
            </div>
          </div>
        </article>
      </header>

      <main class="container">
        <section class="feed-head">
          <div class="tags-scroll" id="tags-scroll"></div>
        </section>

        <section class="post-feed" id="post-feed">
          <div class="loading-block">内容加载中...</div>
        </section>

        <div class="load-more-wrap">
          <button class="btn btn-secondary hidden" id="load-more" type="button">加载更多</button>
        </div>
      </main>
    </div>

    <dialog id="about-drawer" class="about-drawer">
      <div class="drawer-handle"></div>
      <div class="about-content">
        <h3>关于我</h3>
        <p id="about-text">暂无介绍。</p>
        <div class="form-actions">
          <button class="btn btn-primary" type="button" id="about-close">关闭</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="/assets/index.js"></script>
  </body>
</html>
